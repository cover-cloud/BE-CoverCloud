name: Deploy CoverCloud (GCE)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 멀티모듈 기준: user-service, music-service, cover-service, api-gateway
      - name: Build jars (skip tests)
        run: ./gradlew clean :user-service:bootJar :music-service:bootJar :cover-service:bootJar :api-gateway:bootJar -x test

      - name: Collect artifacts
        run: |
          set -e
          mkdir -p dist

          cp -v user-service/build/libs/*.jar dist/
          cp -v music-service/build/libs/*.jar dist/
          cp -v cover-service/build/libs/*.jar dist/
          cp -v api-gateway/build/libs/*.jar dist/

          echo "==== dist ===="
          ls -al dist

      - name: Upload jars to GCE (scp)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "dist/*.jar"
          target: "/home/covercloudofficial/upload/"
          strip_components: 1

      - name: Deploy on GCE (ssh)
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            echo "=== whoami / host ==="
            whoami
            hostname
            echo "=== uploaded jars ==="
            ls -al /home/covercloudofficial/upload || true
            echo "=== run deploy.sh ==="
            bash /home/covercloudofficial/deploy/deploy.sh
