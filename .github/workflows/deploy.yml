name: Deploy CoverCloud (GCE)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"
          
      - name: Create GCS Key File
        run: |
          mkdir -p user-service/src/main/resources
          cat <<'EOF' > user-service/src/main/resources/key.json
          ${{ secrets.GCP_SA_KEY }}
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 멀티모듈 기준: user-service, music-service, cover-service, api-gateway
      - name: Build jars (skip tests)
        run: ./gradlew clean :user-service:bootJar :music-service:bootJar :cover-service:bootJar :api-gateway:bootJar -x test

      - name: Collect artifacts
        run: |
          set -e
          mkdir -p dist
          # 빌드된 jar 파일들을 dist로 복사
          cp -v user-service/build/libs/*.jar dist/
          cp -v music-service/build/libs/*.jar dist/
          cp -v cover-service/build/libs/*.jar dist/
          cp -v api-gateway/build/libs/*.jar dist/
          # 루트에 있는 deploy.sh도 dist로 복사해서 같이 넘길 준비!
          cp -v deploy.sh dist/

      - name: Upload to Oracle Cloud (scp)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }} # ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "dist/*" # dist 폴더 안의 모든 것(jar + deploy.sh)
          target: "/home/${{ secrets.USERNAME }}/deploy/"
          strip_components: 1
      - name: Write Config Files on Oracle Cloud
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            mkdir -p /home/${{ secrets.USERNAME }}/deploy
            
            # GCS 키 파일 생성
            cat <<'EOF' > /home/${{ secrets.USERNAME }}/deploy/gcs-key.json
            ${{ secrets.GCP_SA_KEY }}
            EOF
            
            # 환경 변수 .env 파일 생성
            cat <<'EOF' > /home/${{ secrets.USERNAME }}/deploy/.env
            KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}
            NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}
            NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}
            SPOTIFY_CLIENT_ID=${{ secrets.SPOTIFY_CLIENT_ID }}
            SPOTIFY_CLIENT_SECRET=${{ secrets.SPOTIFY_CLIENT_SECRET }}
            COOKIE_DOMAIN=${{ secrets.COOKIE_DOMAIN }}
            GCP_STORAGE_KEY_PATH=/home/${{ secrets.USERNAME }}/deploy/gcs-key.json
            EOF
            chmod 600 /home/${{ secrets.USERNAME }}/deploy/.env /home/${{ secrets.USERNAME }}/deploy/gcs-key.json

      - name: Execute Deploy Script (ssh)
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            chmod +x /home/${{ secrets.USERNAME }}/deploy/deploy.sh
            bash /home/${{ secrets.USERNAME }}/deploy/deploy.sh
