server:
  port: 8080

spring:
  application:
    name: api-gateway
    
  cloud:
    gateway:
      routes:
        # User Service
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**, /api/test/**, /oauth2/**, /login/**
          filters:
            - RewritePath=/(?<segment>.*), /$\{segment}
            
        # Cover Service
        - id: cover-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/cover/**
          filters:
            - RewritePath=/(?<segment>.*), /$\{segment}
            
        # Music Service
        - id: music-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/music/**
          filters:
            - RewritePath=/(?<segment>.*), /$\{segment}
      
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: 
              - "http://localhost:3000"
              - "http://localhost:3001"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
