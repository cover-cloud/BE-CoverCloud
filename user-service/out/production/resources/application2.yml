server:
  port: 8081
  forward-headers-strategy: framework

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://localhost:3306/covercloud_user?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root1234!
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: 89b63443fe35d95b4e29b1e8e1ba7d4c
            client-secret: nz0TL4yPpuImzr43EyhuB4MMwPtRrgoy
            redirect-uri: "http://localhost:8080/login/oauth2/code/kakao"
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope: [profile_nickname, profile_image]
          naver:
            client-id: 9VmhBqrcqFK_3XKAA6J0
            client-secret: 6AkffDlV0N
            redirect-uri: "http://localhost:8080/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope: [name, nickname, profile_image, email]
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
