<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BE-CoverCloud 테스트 로그인</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .test-accounts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .test-account-btn {
            padding: 15px 12px;
            border: 2px solid #e0e0e0;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            text-align: center;
            font-weight: 500;
            color: #333;
        }

        .test-account-btn:hover {
            border-color: #667eea;
            background: #f0f2ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .test-account-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .test-account-btn-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .test-account-btn-id {
            font-size: 12px;
            opacity: 0.7;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: span 2;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f2ff;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #e8ebff;
        }

        .info-box {
            background: #f0f2ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 6px;
            font-size: 13px;
            color: #333;
            margin-bottom: 20px;
        }

        .info-box strong {
            color: #667eea;
        }

        .token-display {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            font-size: 12px;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            display: none;
        }

        .token-display.show {
            display: block;
        }

        .token-label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 8px;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: #764ba2;
        }

        .copy-btn.copied {
            background: #4caf50;
        }

        .status-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            display: none;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-message.loading {
            background: #e2e3e5;
            color: #383d41;
            border: 1px solid #d6d8db;
        }

        .divider {
            height: 1px;
            background: #e0e0e0;
            margin: 30px 0;
        }

        .quick-links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .quick-link-btn {
            padding: 10px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-align: center;
            text-decoration: none;
            color: #667eea;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quick-link-btn:hover {
            background: #e8ebff;
            border-color: #667eea;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 10px;
        }

        .table th,
        .table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }

        .table tr:hover {
            background: #f8f9fa;
        }

        .table td:first-child {
            font-weight: 500;
            color: #667eea;
        }

        @media (max-width: 480px) {
            .test-accounts {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 24px;
            }

            .content {
                padding: 20px;
            }
        }

        .loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 BE-CoverCloud</h1>
            <p>테스트 계정 로그인</p>
        </div>

        <div class="content">
            <div class="info-box">
                <strong>💡 팁:</strong> 아래 테스트 계정 중 하나를 선택하고 "로그인" 버튼을 클릭하세요.
            </div>

            <!-- 테스트 계정 선택 -->
            <div class="section">
                <div class="section-title">테스트 계정 선택</div>
                <div class="test-accounts">
                    <button class="test-account-btn" data-user-id="1" data-nickname="Test User 1">
                        <div class="test-account-btn-name">👤 User 1</div>
                        <div class="test-account-btn-id">testuser1</div>
                    </button>
                    <button class="test-account-btn" data-user-id="2" data-nickname="Test User 2">
                        <div class="test-account-btn-name">👤 User 2</div>
                        <div class="test-account-btn-id">testuser2</div>
                    </button>
                    <button class="test-account-btn" data-user-id="3" data-nickname="Test User 3">
                        <div class="test-account-btn-name">👤 User 3</div>
                        <div class="test-account-btn-id">testuser3</div>
                    </button>
                    <button class="test-account-btn" data-user-id="4" data-nickname="Test User 4">
                        <div class="test-account-btn-name">👤 User 4</div>
                        <div class="test-account-btn-id">testuser4</div>
                    </button>
                    <button class="test-account-btn" data-user-id="5" data-nickname="Test User 5">
                        <div class="test-account-btn-name">👤 User 5</div>
                        <div class="test-account-btn-id">testuser5</div>
                    </button>
                </div>
            </div>

            <!-- 로그인 버튼 -->
            <div class="button-group">
                <button class="btn-primary" id="loginBtn">로그인</button>
                <button class="btn-secondary" id="createBtn">계정 생성</button>
            </div>

            <!-- 상태 메시지 -->
            <div class="status-message" id="statusMessage"></div>

            <!-- 토큰 표시 -->
            <div class="token-display" id="tokenDisplay">
                <div class="token-label">Access Token:</div>
                <div id="accessTokenValue" style="margin-bottom: 10px;"></div>
                <button class="copy-btn" data-token-type="access">복사</button>

                <div class="token-label" style="margin-top: 15px;">Refresh Token:</div>
                <div id="refreshTokenValue" style="margin-bottom: 10px;"></div>
                <button class="copy-btn" data-token-type="refresh">복사</button>
            </div>

            <div class="divider"></div>

            <!-- 계정 정보 테이블 -->
            <div class="section">
                <div class="section-title">테스트 계정 정보</div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Social ID</th>
                            <th>Nickname</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>testuser1</td>
                            <td>Test User 1</td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>testuser2</td>
                            <td>Test User 2</td>
                        </tr>
                        <tr>
                            <td>3</td>
                            <td>testuser3</td>
                            <td>Test User 3</td>
                        </tr>
                        <tr>
                            <td>4</td>
                            <td>testuser4</td>
                            <td>Test User 4</td>
                        </tr>
                        <tr>
                            <td>5</td>
                            <td>testuser5</td>
                            <td>Test User 5</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080';
        let selectedUserId = null;
        let currentTokens = {};

        // 계정 버튼 클릭
        document.querySelectorAll('.test-account-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.test-account-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedUserId = this.dataset.userId;
            });
        });

        // 첫 번째 계정 기본 선택
        document.querySelector('.test-account-btn').click();

        // 로그인 버튼
        document.getElementById('loginBtn').addEventListener('click', async function() {
            if (!selectedUserId) {
                showMessage('계정을 선택해주세요', 'error');
                return;
            }

            this.disabled = true;
            showMessage('<span class="loader"></span>로그인 중...', 'loading');

            try {
                const response = await fetch(
                    `${API_BASE_URL}/api/test/get-token?userId=${selectedUserId}`,
                    { method: 'POST' }
                );

                const data = await response.json();

                if (data.success) {
                    currentTokens = data.data;
                    displayTokens(currentTokens);
                    showMessage(`✅ ${document.querySelector(`[data-user-id="${selectedUserId}"]`).dataset.nickname}로 로그인했습니다!`, 'success');

                    // 로컬스토리지에 토큰 저장
                    localStorage.setItem('accessToken', currentTokens.accessToken);
                    localStorage.setItem('refreshToken', currentTokens.refreshToken);
                    localStorage.setItem('userId', selectedUserId);

                    // 3초 후 원래 페이지로 이동 (선택사항)
                    setTimeout(() => {
                        // window.location.href = '/'; // 메인 페이지로 이동
                    }, 2000);
                } else {
                    showMessage('❌ 로그인 실패: ' + data.message, 'error');
                }
            } catch (error) {
                showMessage('❌ 오류 발생: ' + error.message, 'error');
            } finally {
                this.disabled = false;
            }
        });

        // 계정 생성 버튼
        document.getElementById('createBtn').addEventListener('click', async function() {
            this.disabled = true;
            showMessage('<span class="loader"></span>계정 생성 중...', 'loading');

            try {
                const response = await fetch(`${API_BASE_URL}/api/test/create-test-users`);
                const data = await response.json();

                if (data.success) {
                    const count = data.data.created;
                    showMessage(`✅ ${count}개의 테스트 계정이 생성되었습니다!`, 'success');
                } else {
                    showMessage('❌ 계정 생성 실패: ' + data.message, 'error');
                }
            } catch (error) {
                showMessage('❌ 오류 발생: ' + error.message, 'error');
            } finally {
                this.disabled = false;
            }
        });

        // 상태 메시지 표시
        function showMessage(message, type) {
            const msgEl = document.getElementById('statusMessage');
            msgEl.innerHTML = message;
            msgEl.className = `status-message show ${type}`;
        }

        // 토큰 표시
        function displayTokens(tokens) {
            document.getElementById('accessTokenValue').textContent = tokens.accessToken;
            document.getElementById('refreshTokenValue').textContent = tokens.refreshToken;
            document.getElementById('tokenDisplay').classList.add('show');
        }

        // 복사 버튼
        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tokenType = this.dataset.tokenType;
                const token = tokenType === 'access' ? currentTokens.accessToken : currentTokens.refreshToken;

                navigator.clipboard.writeText(token).then(() => {
                    const originalText = this.textContent;
                    this.textContent = '✅ 복사됨!';
                    this.classList.add('copied');

                    setTimeout(() => {
                        this.textContent = originalText;
                        this.classList.remove('copied');
                    }, 2000);
                });
            });
        });

        // 페이지 로드 시 저장된 토큰이 있으면 표시
        window.addEventListener('load', () => {
            const accessToken = localStorage.getItem('accessToken');
            if (accessToken) {
                currentTokens = {
                    accessToken: accessToken,
                    refreshToken: localStorage.getItem('refreshToken')
                };
                displayTokens(currentTokens);
                showMessage(`✅ 저장된 토큰으로 로그인 상태입니다 (User ${localStorage.getItem('userId')})`, 'success');
            }
        });
    </script>
</body>
</html>
