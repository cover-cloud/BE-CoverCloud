server:
  port: 8081
  forward-headers-strategy: framework

cookie:
  domain: ${COOKIE_DOMAIN:""}

frontend:
  redirect:
    base-url: https://covercloud.kr/main

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://34.50.47.209:3306/covercloud_user?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: NewPassword123!
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "https://www.covercloud.kr/login/oauth2/code/kakao"
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope: [profile_nickname, profile_image]
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: "https://www.covercloud.kr/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope: [name, nickname, profile_image, email]
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    com.covercloud: DEBUG
gcs:
  bucket: covercloud-bucket